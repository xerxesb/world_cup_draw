name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ fromJSON(steps.deployment.outputs.outputs).page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        # actions/deploy-pages intermittently fails with "Deployment failed, try
        # again later" (known upstream issue: actions/deploy-pages#418).
        # Retry a few times before giving up.
        uses: Wandalen/wretry.action@v3.8.0
        with:
          action: actions/deploy-pages@v5
          attempt_limit: 3
          attempt_delay: 15000
