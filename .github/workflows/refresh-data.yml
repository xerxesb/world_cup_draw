name: Refresh World Cup Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh:data
      - run: npm test -- --run
      - run: npm run build
      - name: Commit refreshed data
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh world cup data"
          file_pattern: public/data/live-data.json
      - name: Skip deploy if data unchanged
        id: should-deploy
        if: steps.auto-commit.outputs.changes_detected == 'true' || github.event_name == 'workflow_dispatch'
        run: echo "deploy=true" >> "$GITHUB_OUTPUT"
      - if: steps.should-deploy.outputs.deploy == 'true'
        uses: actions/configure-pages@v5
      - if: steps.should-deploy.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        if: steps.should-deploy.outputs.deploy == 'true'
        uses: actions/deploy-pages@v4
